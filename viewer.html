<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>3D Viewer — Abu Naseeb Al-Baghdaddiya Family House</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230A0A0F'/><path d='M6 13L16 6l10 7v12a1 1 0 01-1 1H7a1 1 0 01-1-1z' fill='%23C9A84C'/><rect x='13' y='14' width='6' height='8' fill='%230A0A0F'/></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#C9A84C;--dark:#0A0A0F;--panel:rgba(10,10,15,0.93);--text:#F0EDE6;--muted:#7A7870;--border:rgba(201,168,76,0.15);}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'DM Mono',monospace;}
    #canvas-container{position:fixed;top:56px;left:0;right:0;bottom:0;}
    canvas{display:block;}
    #header{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;backdrop-filter:blur(12px);}
    .back-btn{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);letter-spacing:0.1em;cursor:pointer;background:none;border:none;transition:color 0.2s;}
    .back-btn:hover{color:var(--gold);}
    .header-center{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);letter-spacing:0.04em;}
    .header-center span{color:var(--gold);}
    .point-count{font-size:10px;color:var(--muted);letter-spacing:0.1em;}
    .point-count em{color:var(--gold);font-style:normal;}
    #layer-panel{position:fixed;top:76px;right:20px;width:220px;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;backdrop-filter:blur(14px);z-index:150;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
    .panel-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
    .panel-header-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
    .panel-header-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);}
    .layer-item{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,0.06);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.15s;}
    .layer-item:last-child{border-bottom:none;}
    .layer-item:hover{background:rgba(201,168,76,0.04);}
    .layer-left{display:flex;align-items:center;gap:10px;}
    .layer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .dot-pc{background:#7EC8E3;box-shadow:0 0 6px rgba(126,200,227,0.5);}
    .dot-bim{background:#A8D8A8;box-shadow:0 0 6px rgba(168,216,168,0.5);}
    .dot-img{background:#F4C97A;box-shadow:0 0 6px rgba(244,201,122,0.5);}
    .layer-name{font-size:11px;color:var(--text);letter-spacing:0.05em;}
    .layer-sub{font-size:9px;color:var(--muted);letter-spacing:0.08em;margin-top:1px;}
    .toggle{width:34px;height:18px;background:rgba(255,255,255,0.08);border-radius:9px;position:relative;transition:background 0.25s;flex-shrink:0;}
    .toggle.on{background:var(--gold);}
    .toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:white;top:3px;left:3px;transition:left 0.25s;}
    .toggle.on::after{left:19px;}
    #viewcube{position:fixed;top:76px;left:20px;width:110px;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;backdrop-filter:blur(14px);z-index:150;box-shadow:0 8px 32px rgba(0,0,0,0.5);padding:12px;}
    .vc-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block;}
    .vc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
    .vc-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:5px;padding:7px 0;font-size:9px;color:var(--muted);letter-spacing:0.06em;text-align:center;cursor:pointer;transition:all 0.15s;}
    .vc-btn:hover{color:var(--gold);border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.08);}
    .vc-wide{grid-column:span 3;}
    #stats-bar{position:fixed;bottom:20px;left:20px;display:flex;gap:10px;z-index:150;}
    .stat-pill{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:10px;color:var(--muted);letter-spacing:0.08em;backdrop-filter:blur(8px);}
    .stat-pill em{color:var(--text);font-style:normal;}
    #hint{position:fixed;bottom:60px;left:20px;font-size:10px;color:var(--muted);letter-spacing:0.08em;z-index:150;line-height:1.9;}
    #loading-overlay{position:fixed;inset:0;z-index:300;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.8s;}
    #loading-overlay.hidden{opacity:0;pointer-events:none;}
    .loading-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);letter-spacing:0.06em;}
    .loading-logo span{color:var(--gold);}
    .loading-bar-track{width:240px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
    .loading-bar-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width 0.3s ease;}
    .loading-text{font-size:10px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;}

  </style>
</head>
<body>
<div id="loading-overlay">
  <div class="loading-logo">Abu Naseeb <span>·</span> 3D Viewer</div>
  <div class="loading-bar-track"><div class="loading-bar-fill" id="load-bar"></div></div>
  <div class="loading-text" id="load-text">Initialising…</div>
</div>
<div id="header">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to Map
  </button>
  <div class="header-center">Abu Naseeb <span>·</span> Al-Baghdaddiya Family House</div>
  <div class="point-count">☁ <em>3,907,305</em> pts</div>
</div>
<div id="canvas-container"></div>
<div id="viewcube">
  <span class="vc-label">Navigate</span>
  <div class="vc-grid">
    <div class="vc-btn vc-wide" onclick="setView('top')">TOP</div>
    <div class="vc-btn vc-wide" onclick="setView('iso')">HOME</div>
    <div class="vc-btn" onclick="setView('left')">L</div>
    <div class="vc-btn" onclick="setView('front')">FRONT</div>
    <div class="vc-btn" onclick="setView('right')">R</div>
    <div class="vc-btn vc-wide" onclick="setView('back')">BACK</div>
    <div class="vc-btn vc-wide" onclick="resetView()">⟳ RESET</div>
  </div>
</div>
<div id="layer-panel">
  <div class="panel-header">
    <div class="panel-header-label">Layers</div>
    <div class="panel-header-title">Toggle Visibility</div>
  </div>
  <div class="layer-item" onclick="toggleLayer('pc')">
    <div class="layer-left"><div class="layer-dot dot-pc"></div><div><div class="layer-name">Point Cloud</div><div class="layer-sub">E57 · Laser Scan</div></div></div>
    <div class="toggle on" id="toggle-pc"></div>
  </div>
  <div class="layer-item" onclick="toggleLayer('bim')">
    <div class="layer-left"><div class="layer-dot dot-bim"></div><div><div class="layer-name">BIM Model</div><div class="layer-sub">Revit · GLTF</div></div></div>
    <div class="toggle" id="toggle-bim"></div>
  </div>

</div>
<div id="stats-bar">
  <div class="stat-pill">Lat <em>21.4738°N</em></div>
  <div class="stat-pill">Lng <em>39.1908°E</em></div>
  <div class="stat-pill">Alt <em>~245m</em></div>
</div>
<div id="hint">Left drag · Rotate<br>Right drag · Pan<br>Scroll · Zoom</div>

<script>
// Point cloud loaded from merged pointcloud.pcbn
  // ── State ──
  const layerState = {pc:true, bim:false, img:false};
  let pcPoints=null, bimMesh=null, dronePlane=null;
  let sceneCenter=new THREE.Vector3(), sceneSize=new THREE.Vector3(), sceneBox=null;

  const loadBar=document.getElementById('load-bar');
  const loadText=document.getElementById('load-text');
  function setProgress(p,t){loadBar.style.width=p+'%';if(t)loadText.textContent=t;}

  // ── Renderer (Y-up — Three.js default) ──
  const container=document.getElementById('canvas-container');
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(container.clientWidth,container.clientHeight);
  renderer.setClearColor(0x0d0d14,1);
  container.appendChild(renderer.domElement);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(55,container.clientWidth/container.clientHeight,0.1,2000);
  camera.position.set(80,60,100);

  const controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true; controls.dampingFactor=0.1;
  controls.rotateSpeed=0.4; controls.zoomSpeed=0.6; controls.panSpeed=0.4;
  controls.minDistance=1; controls.maxDistance=800;

  scene.add(new THREE.AmbientLight(0xfff4e0, 0.6));
  const sun=new THREE.DirectionalLight(0xfff8f0, 1.2);
  sun.position.set(60,100,50); scene.add(sun);
  const fill=new THREE.DirectionalLight(0xc8d8ff, 0.35);
  fill.position.set(-40,20,-30); scene.add(fill);

  window.addEventListener('resize',()=>{
    const w=container.clientWidth,h=container.clientHeight;
    camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
  });

  (function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);})();

  // ── Point cloud decoder ──
  // Potree 1.7: each bin's raw ints are relative to THAT NODE'S bounding box origin.
  // We've pre-computed each node's origin (lx,ly,lz) from the octree hierarchy.
  //
  // Data is Z-up (Metashape). Three.js is Y-up.
  // Conversion: sceneX=worldX, sceneY=worldZ, sceneZ=-worldY
  // Centre: subtract (cx, cz, -cy) where cx/cy/cz are world midpoints.


  // ── Fast single-file point cloud loader ──
  // pointcloud.pcbn: magic(4) + count(4) + bbox(24) + N*(x_u16,y_u16,z_u16,r,g,b) = 9B/pt
  // tightBB baked in: lx,ux,ly,uy,lz,uz as float32
  // Potree Z-up converted to Three.js Y-up: sceneX=worldX, sceneY=worldZ, sceneZ=-worldY

  async function loadPointCloud(){
    setProgress(5,'Downloading point cloud…');
    const buf = await fetch('./pointcloud.pcbn').then(r => {
      const total = parseInt(r.headers.get('Content-Length') || 0);
      const reader = r.body.getReader();
      const chunks = [];
      let loaded = 0;
      return new ReadableStream({
        start(ctrl) {
          function pump() {
            reader.read().then(({done,value}) => {
              if(done){ctrl.close();return;}
              chunks.push(value); loaded+=value.length;
              if(total) setProgress(5+Math.round((loaded/total)*60), `Downloading… ${Math.round(loaded/1024/1024)}MB`);
              ctrl.enqueue(value); pump();
            });
          }
          pump();
        }
      });
    }).then(s => new Response(s).arrayBuffer());

    setProgress(68,'Decoding points…');
    const dv = new DataView(buf);
    const magic = String.fromCharCode(dv.getUint8(0),dv.getUint8(1),dv.getUint8(2),dv.getUint8(3));
    if(magic !== 'PCBN') throw new Error('Invalid point cloud file');

    const nPts = dv.getUint32(4, true);
    const lx=dv.getFloat32(8,true),  ux=dv.getFloat32(12,true);
    const ly=dv.getFloat32(16,true), uy=dv.getFloat32(20,true);
    const lz=dv.getFloat32(24,true), uz=dv.getFloat32(28,true);
    const rx=ux-lx, ry=uy-ly, rz=uz-lz;
    // Scene centre (Potree world space)
    const cx=(lx+ux)/2, cy=(ly+uy)/2, cz=lz;

    const posArr = new Float32Array(nPts*3);
    const colArr = new Float32Array(nPts*3);
    const BASE = 32;
    for(let i=0;i<nPts;i++){
      const o = BASE + i*9;
      const qx=dv.getUint16(o,  true);
      const qy=dv.getUint16(o+2,true);
      const qz=dv.getUint16(o+4,true);
      // Dequantize to world (Z-up)
      const wx = qx/65535*rx + lx - cx;
      const wy = qy/65535*ry + ly - cy;
      const wz = qz/65535*rz + lz - cz;
      // Convert Z-up -> Y-up
      posArr[i*3]   = wx;
      posArr[i*3+1] = wz;
      posArr[i*3+2] = -wy;
      colArr[i*3]   = dv.getUint8(o+6)/255;
      colArr[i*3+1] = dv.getUint8(o+7)/255;
      colArr[i*3+2] = dv.getUint8(o+8)/255;
    }

    setProgress(82,'Building geometry…');
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(posArr,3));
    geo.setAttribute('color',new THREE.Float32BufferAttribute(colArr,3));
    const mat=new THREE.PointsMaterial({size:0.2,vertexColors:true,sizeAttenuation:true});
    pcPoints=new THREE.Points(geo,mat);
    pcPoints.visible=layerState.pc;
    scene.add(pcPoints);
    geo.computeBoundingBox();
    const box=geo.boundingBox;
    box.getCenter(sceneCenter); box.getSize(sceneSize); sceneBox=new THREE.Box3().copy(box);
    fitCamera();
    return {center:sceneCenter.clone(), size:sceneSize.clone(), box:new THREE.Box3().copy(box)};
  }

  function fitCamera(){
    const d=Math.max(sceneSize.x,sceneSize.y,sceneSize.z);
    controls.target.copy(sceneCenter);
    camera.position.set(sceneCenter.x+d*0.8, sceneCenter.y+d*0.65, sceneCenter.z+d*0.85);
    controls.update();
  }

  function setView(v){
    const d=Math.max(sceneSize.x,sceneSize.y,sceneSize.z)*1.5;
    const c=sceneCenter;
    controls.target.copy(c);
    if(v==='top')   camera.position.set(c.x, c.y+d*2,   c.z);
    if(v==='front') camera.position.set(c.x, c.y+sceneSize.y*0.3, c.z+d*1.5);
    if(v==='back')  camera.position.set(c.x, c.y+sceneSize.y*0.3, c.z-d*1.5);
    if(v==='left')  camera.position.set(c.x-d*1.5, c.y+sceneSize.y*0.3, c.z);
    if(v==='right') camera.position.set(c.x+d*1.5, c.y+sceneSize.y*0.3, c.z);
    if(v==='iso')   camera.position.set(c.x+d*0.8, c.y+d*0.65, c.z+d*0.85);
    controls.update();
  }
  function resetView(){fitCamera();}

  // ── BIM ──
  // GLB from Revit: Y-up, scale 0.3048 per node (feet->m) already applied.
  // Three.js is also Y-up — so NO rotation needed.
  // Just scale to match building height and centre over point cloud.
  function loadBIM(pcInfo){
    return new Promise(resolve=>{
      new THREE.GLTFLoader().load('./bim_model.glb', gltf=>{
        bimMesh=gltf.scene;
        bimMesh.updateMatrixWorld(true);
        const bb1=new THREE.Box3().setFromObject(bimMesh);
        const s1=new THREE.Vector3(); bb1.getSize(s1);
        // Scale so BIM height matches point cloud height
        const s=pcInfo.size.y/s1.y;
        bimMesh.scale.setScalar(s);
        bimMesh.updateMatrixWorld(true);
        const bb2=new THREE.Box3().setFromObject(bimMesh);
        const c2=new THREE.Vector3(); bb2.getCenter(c2);
        bimMesh.position.set(
          pcInfo.center.x-c2.x,
          pcInfo.box.min.y-bb2.min.y,
          pcInfo.center.z-c2.z
        );
        // Solid architectural colors by element type — fully opaque, matte
        const BIM_COLORS = {
          wall:     {col:0xC8B49A, tr:false, op:1.0},  // sandstone
          floor:    {col:0x7A6E65, tr:false, op:1.0},  // dark stone
          ceil:     {col:0xDDD0BE, tr:false, op:1.0},  // plaster
          roof:     {col:0x8C6E52, tr:false, op:1.0},  // terracotta
          stair:    {col:0xA89880, tr:false, op:1.0},  // concrete
          door:     {col:0x6B4510, tr:false, op:1.0},  // dark timber
          window:   {col:0xA8DCF0, tr:true,  op:0.4},  // glass
          column:   {col:0xC8B860, tr:false, op:1.0},  // structural
          beam:     {col:0xC8B860, tr:false, op:1.0},
          railing:  {col:0x606870, tr:false, op:1.0},  // dark metal
          rail:     {col:0x606870, tr:false, op:1.0},
          furniture:{col:0xB89040, tr:false, op:1.0},
          casework: {col:0xB89040, tr:false, op:1.0},
          tree:     {col:0x4A7A40, tr:false, op:1.0},
          plant:    {col:0x4A7A40, tr:false, op:1.0},
        };
        const DEFAULT_BIM = {col:0xBCAA92, tr:false, op:1.0};

        bimMesh.traverse(ch=>{
          if(!ch.isMesh) return;
          const nm=(ch.parent?.name||ch.name||'').toLowerCase();
          let cfg = DEFAULT_BIM;
          for(const [key,val] of Object.entries(BIM_COLORS)){
            if(nm.includes(key)){cfg=val;break;}
          }
          ch.material=new THREE.MeshLambertMaterial({
            color:cfg.col,
            transparent:cfg.tr, opacity:cfg.op,
            side:THREE.FrontSide,
          });
        });
        bimMesh.visible=layerState.bim;
        scene.add(bimMesh);
        resolve();
      },undefined,()=>resolve());
    });
  }

  // ── Drone plane ──
  function loadDronePlane(pcInfo){
    const tryLoad=(src,fb)=>{
      new THREE.TextureLoader().load(src,tex=>{
        const geo=new THREE.PlaneGeometry(pcInfo.size.x*1.4, pcInfo.size.z*1.4);
        const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:0.75,side:THREE.DoubleSide,depthWrite:false});
        dronePlane=new THREE.Mesh(geo,mat);
        dronePlane.rotation.x=-Math.PI/2;
        dronePlane.position.set(pcInfo.center.x, pcInfo.box.max.y+15, pcInfo.center.z);
        dronePlane.visible=layerState.img;
        scene.add(dronePlane);
      },undefined,()=>{if(fb)tryLoad(fb,null);});
    };
    tryLoad('./drone.JPG','./drone.jpg');
  }

  // ── Toggles ──
  function toggleLayer(id){
    layerState[id]=!layerState[id];
    document.getElementById('toggle-'+id).classList.toggle('on',layerState[id]);
    if(id==='pc'  && pcPoints)  pcPoints.visible=layerState.pc;
    if(id==='bim' && bimMesh)   bimMesh.visible=layerState.bim;
    if(id==='img' && dronePlane) dronePlane.visible=layerState.img;
  }


  // ── Boot ──
  (async()=>{
    try{
      // Check URL param for which layer to default to
      const urlLayer = new URLSearchParams(window.location.search).get('layer');
      if(urlLayer==='bim'){
        layerState.pc=false; layerState.bim=true;
        document.getElementById('toggle-pc').classList.remove('on');
        document.getElementById('toggle-bim').classList.add('on');
      }

      const pcInfo=await loadPointCloud();
      setProgress(82,'Loading BIM…');
      await loadBIM(pcInfo);
      setProgress(94,'Loading drone image…');
      loadDronePlane(pcInfo);
      setProgress(100,'Ready');
      setTimeout(()=>{
        document.getElementById('loading-overlay').classList.add('hidden');
      },500);
    }catch(err){
      loadText.textContent='Error: '+err.message;
      console.error(err);
    }
  })();
</script>
</body>
</html>
